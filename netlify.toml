[build]
  command = "npm ci && node node_modules/vite/bin/vite.js build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NPM_CONFIG_PRODUCTION = "false"  

[functions]
  node_bundler = "esbuild"

# REDIRECTS PARA API DEVEM VIR ANTES do SPA fallback
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/fatura"
  to = "/.netlify/functions/api/fatura"
  status = 200

# SPA fallback (React Router) — deve ser o ÚLTIMO
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200