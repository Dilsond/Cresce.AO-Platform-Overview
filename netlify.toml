[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# SPA fallback (para React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Redireciona todas as chamadas /api/* para a função
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Redireciona /fatura também (porque é uma rota do backend)
[[redirects]]
  from = "/fatura"
  to = "/.netlify/functions/api/fatura"
  status = 200